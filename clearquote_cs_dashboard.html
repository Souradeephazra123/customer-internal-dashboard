
<h2 class="sr-only">ClearQuote Customer Success Dashboard — internal tool showing customer health, usage metrics, support tickets, and fleet distribution across 30 US customers.</h2>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
#cq-dash{width:100%;padding:0}
.cq-header{padding:16px 20px 12px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between;gap:12px}
.cq-logo{display:flex;align-items:center;gap:8px}
.cq-logo-mark{width:28px;height:28px;background:#1D9E75;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:500}
.cq-logo-text{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.cq-logo-sub{font-size:12px;color:var(--color-text-secondary);margin-left:4px}
.cq-header-right{font-size:12px;color:var(--color-text-secondary)}
.cq-tabs{display:flex;border-bottom:0.5px solid var(--color-border-tertiary);padding:0 20px;gap:0}
.cq-tab{padding:10px 16px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--color-text-secondary);white-space:nowrap}
.cq-tab.active{color:#1D9E75;border-bottom-color:#1D9E75;font-weight:500}
.cq-tab:hover:not(.active){color:var(--color-text-primary)}
.cq-panel{display:none;padding:20px}
.cq-panel.active{display:block}
.metric-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px}
.metric-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px}
.metric-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
.metric-value{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.metric-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.section-title{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:12px}
.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filters input,.filters select{font-size:12px;padding:5px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary)}
.cq-table{width:100%;font-size:12px;border-collapse:collapse}
.cq-table th{text-align:left;padding:7px 10px;font-size:11px;font-weight:500;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary);white-space:nowrap}
.cq-table td{padding:8px 10px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary)}
.cq-table tr:last-child td{border-bottom:none}
.cq-table tr:hover td{background:var(--color-background-secondary)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.badge-green{background:#EAF3DE;color:#3B6D11}
.badge-amber{background:#FAEEDA;color:#854F0B}
.badge-red{background:#FCEBEB;color:#A32D2D}
.badge-blue{background:#E6F1FB;color:#185FA5}
.badge-gray{background:#F1EFE8;color:#5F5E5A}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
.chart-box{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px}
.table-box{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px;overflow-x:auto}
.map-wrap{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px;margin-top:16px}
.health-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}
.hd-green{background:#639922}.hd-amber{background:#BA7517}.hd-red{background:#E24B4A}
.progress-bar{height:5px;border-radius:3px;background:var(--color-background-secondary);overflow:hidden;margin-top:3px}
.progress-fill{height:100%;border-radius:3px}
@media(max-width:600px){.two-col{grid-template-columns:1fr}.metric-row{grid-template-columns:1fr 1fr}}
</style>

function fmt(n){return n>=1000?(n/1000).toFixed(1)+'k':n}
function fmtMrr(n){return '$'+n.toLocaleString()}
function statusBadge(s){const m={Healthy:'badge-green','At Risk':'badge-amber',Churned:'badge-red'};return`<span class="badge ${m[s]||'badge-gray'}">${s}</span>`}
function tierBadge(t){const m={Enterprise:'badge-blue',Growth:'badge-green',Starter:'badge-gray'};return`<span class="badge ${m[t]||'badge-gray'}">${t}</span>`}
function prioBadge(p){const m={Critical:'badge-red',High:'badge-amber',Medium:'badge-blue',Low:'badge-gray'};return`<span class="badge ${m[p]||'badge-gray'}">${p}</span>`}
function statusTicketBadge(s){const m={Open:'badge-amber','In Progress':'badge-blue',Resolved:'badge-green'};return`<span class="badge ${m[s]||'badge-gray'}">${s}</span>`}
function healthDot(s){const m={Healthy:'hd-green','At Risk':'hd-amber',Churned:'hd-red'};return`<span class="health-dot ${m[s]||''}"></span>`}

let activeTab='overview';
function showTab(t){
  document.querySelectorAll('.cq-tab').forEach((el,i)=>{const tabs=['overview','usage','support','fleet'];el.classList.toggle('active',tabs[i]===t)});
  document.querySelectorAll('.cq-panel').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  activeTab=t;
  if(t==='overview')renderOverview();
  else if(t==='usage')renderUsage();
  else if(t==='support')renderSupport();
  else renderFleet();
}

const STATE_COORDS={CA:[36.7,-119.4],TX:[31.2,-99.3],NY:[42.9,-75.5],WA:[47.4,-120.5],CO:[39.0,-105.5],IL:[40.0,-89.2],AZ:[34.3,-111.6],MN:[46.4,-94.3],FL:[27.8,-81.6],GA:[32.9,-83.4],LA:[31.2,-92.0],OH:[40.4,-82.8],NC:[35.6,-79.0],OR:[44.6,-120.5],UT:[39.5,-111.5],KS:[38.5,-98.4],PA:[40.9,-77.8],TN:[35.7,-86.7],MI:[44.3,-85.4],NM:[34.8,-106.2],VA:[37.8,-78.2],SC:[33.8,-81.2],NV:[38.8,-116.4],MO:[38.5,-92.5],ID:[44.4,-114.6],MS:[32.7,-89.7],MA:[42.4,-71.9],OK:[35.5,-97.5]};

function drawMap(){
  const el=document.getElementById('us-map');
  if(!el)return;
  const w=el.offsetWidth||640,h=Math.round(w*0.55);
  el.innerHTML='';
  const svg=d3.select('#us-map').append('svg').attr('viewBox',`0 0 ${w} ${h}`).attr('width','100%');
  const proj=d3.geoAlbersUsa().scale(w*1.28).translate([w/2,h/2]);
  const isDark=matchMedia('(prefers-color-scheme:dark)').matches;
  d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json').then(us=>{
    const path=d3.geoPath(proj);
    svg.selectAll('path').data(topojson.feature(us,us.objects.states).features).join('path')
      .attr('d',path)
      .attr('fill',isDark?'#2C2C2A':'#F1EFE8')
      .attr('stroke',isDark?'#444':'#D3D1C7')
      .attr('stroke-width',0.5);
    CUSTOMERS.forEach(c=>{
      const coord=STATE_COORDS[c.state];
      if(!coord)return;
      const xy=proj([coord[1],coord[0]]);
      if(!xy)return;
      const color=c.status==='Healthy'?'#1D9E75':c.status==='At Risk'?'#BA7517':'#A32D2D';
      const r=c.tier==='Enterprise'?7:c.tier==='Growth'?5:4;
      svg.append('circle').attr('cx',xy[0]).attr('cy',xy[1]).attr('r',r).attr('fill',color).attr('opacity',0.85).attr('stroke','#fff').attr('stroke-width',1);
    });
    const legend=[['#1D9E75','Healthy'],['#BA7517','At Risk'],['#A32D2D','Churned']];
    legend.forEach((l,i)=>{
      svg.append('circle').attr('cx',14).attr('cy',h-60+i*18).attr('r',5).attr('fill',l[0]);
      svg.append('text').attr('x',24).attr('y',h-56+i*18).attr('fill',isDark?'#D3D1C7':'#5F5E5A').attr('font-size',11).text(l[1]);
    });
    svg.append('text').attr('x',14).attr('y',h-76).attr('fill',isDark?'#888780':'#888780').attr('font-size',10).text('Circle size = tier · Color = status');
  }).catch(()=>{el.innerHTML='<p style="font-size:12px;color:var(--color-text-secondary);padding:8px">Map unavailable</p>'});
}

function updateUsageCharts(){
  const custId=parseInt(document.getElementById('usage-cust').value);
  const data=USAGE.filter(u=>u.custId===custId).sort((a,b)=>a.month>b.month?1:-1);
  const labels=data.map(u=>u.month.slice(5)+'/'+u.month.slice(2,4));
  const isDark=matchMedia('(prefers-color-scheme:dark)').matches;
  const textColor=isDark?'#D3D1C7':'#888780';
  const gridColor=isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)';
  usageCharts.forEach(c=>c.destroy());usageCharts=[];
  function mkChart(id,label,vals,color){
    const ctx=document.getElementById(id);
    if(!ctx)return;
    usageCharts.push(new Chart(ctx,{type:'line',data:{labels,datasets:[{label,data:vals,borderColor:color,backgroundColor:color+'22',borderWidth:2,pointRadius:3,tension:0.3,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:textColor,font:{size:10}},grid:{color:gridColor}},y:{ticks:{color:textColor,font:{size:10}},grid:{color:gridColor}}}}}));
  }
  mkChart('ch-insp','Inspections',data.map(u=>u.inspections),'#1D9E75');
  mkChart('ch-dmg','Dmg %',data.map(u=>u.dmgRate),'#E24B4A');
  mkChart('ch-drv','Drivers',data.map(u=>u.activeDrivers),'#378ADD');
  mkChart('ch-api','API calls',data.map(u=>u.apiCalls),'#BA7517');
}

function filterTickets(){
  const q=(document.getElementById('tk-search').value||'').toLowerCase();
  const status=document.getElementById('tk-status').value;
  const prio=document.getElementById('tk-prio').value;
  const channel=document.getElementById('tk-channel').value;
  const rows=TICKETS.filter(t=>
    (!q||t.subject.toLowerCase().includes(q))&&
    (!status||t.status===status)&&
    (!prio||t.priority===prio)&&
    (!channel||t.channel===channel)
  ).sort((a,b)=>{const o={Critical:0,High:1,Medium:2,Low:3};return o[a.priority]-o[b.priority]});
  const custName=id=>{const c=CUSTOMERS.find(x=>x.id===id);return c?c.name:'#'+id};
  document.getElementById('tk-tbody').innerHTML=rows.map(t=>`
  <tr>
    <td style="color:var(--color-text-secondary);font-size:11px">${t.id}</td>
    <td style="font-weight:500">${custName(t.custId)}</td>
    <td>${t.subject}</td>
    <td>${prioBadge(t.priority)}</td>
    <td>${statusTicketBadge(t.status)}</td>
    <td>${t.channel}</td>
    <td>${t.csat?'★'.repeat(t.csat):'—'}</td>
    <td style="${t.age>7?'color:#A32D2D;font-weight:500':'color:var(--color-text-secondary)'}">${t.age}d</td>
  </tr>`).join('');
}
